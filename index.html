<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHFR Calculator</title>
    <style>
        body { 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 10px; background-color: transparent; 
            display: flex; justify-content: center;
        }
        .card { 
            background: white; border-radius: 12px; padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%; max-width: 350px; box-sizing: border-box;
            border: 1px solid #ddd;
        }
        label { font-weight: bold; font-size: 14px; color: #555; }
        input { 
            width: 100%; padding: 15px; font-size: 20px; 
            border: 2px solid #800000; /* PHFR Maroon */
            border-radius: 8px; box-sizing: border-box; margin-top: 5px;
        }
        .results { margin-top: 15px; }
        .med-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #eee; 
        }
        .med-name { font-weight: 600; color: #333; font-size: 16px; }
        .dose-val { font-weight: 800; color: #d9534f; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <label>Patient Weight (kg)</label>
        <input type="number" id="weight" placeholder="0" oninput="calc()">
        
        <div class="results">
            <div class="med-row">
                <span class="med-name">Fentanyl (1mcg/kg)</span>
                <span class="dose-val"><span id="fent">0</span> mL</span>
            </div>
            <div class="med-row">
                <span class="med-name">Versed (0.1mg/kg)</span>
                <span class="dose-val"><span id="versed">0</span> mL</span>
            </div>
        </div>
    </div>

    <script>
        function calc() {
            const kg = parseFloat(document.getElementById('weight').value);
            if (kg > 0) {
                // Fentanyl 50mcg/1mL
                document.getElementById('fent').innerText = ((kg * 1) / 50).toFixed(2);
                // Versed 5mg/1mL
                document.getElementById('versed').innerText = ((kg * 0.1) / 5).toFixed(2);
            } else {
                document.getElementById('fent').innerText = "0";
                document.getElementById('versed').innerText = "0";
            }
        }
    </script>
</body>
</html>
